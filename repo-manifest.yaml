repo:
  name: akasha-collect
  ecosystem: akasha
  version: 0.1.0
  status: active

engine:
  family: observation
  class: intake_engine
  role: structured_observation_collection

identity:
  role: engine
  layer: intake
  description: >
    Observation collection engine for the Akasha constellation.
    Responsible for gathering structured inputs, notes, signals, and source material
    so they can be normalized and handed downstream into the event and pattern layers.

ownership:
  steward: human
  approval_required: true

interfaces:
  consumes:
    - source_inputs
    - raw_notes
    - collected_signals
  produces:
    - structured_observations
    - normalized_inputs
    - intake_ready_records

capabilities:
  - observation_collection
  - signal_gathering
  - structured_input_capture
  - intake_normalization

alignment:
  axioms_required: true
  canonical_structure: true
  interpretation_free_core: true

depends_on:
  - akasha-events
  - akasha-time-nexus

# ---- Canonical sections added by akasha-canon ----
type: organ

family: discovery

role: collect

